name: CI

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://quizforge:quizforge@localhost:5432/quizforge?schema=public
      JWT_SECRET: ci-only-secret-that-is-long-enough-to-pass-validation
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=moderate
